<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaga Auxiliar de Loja</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: #facc15; margin: 0; }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    label { display: block; margin-top: 15px; font-size: 14px; }
    input, select, textarea {
      width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: none; font-size: 14px;
    }
    button {
      width: 100%; padding: 15px; margin-top: 20px;
      background: linear-gradient(90deg, #ef4444, #facc15);
      border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .footer { text-align: center; font-size: 12px; margin-top: 15px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>🚨 VAGA ABERTA</h1>
      <h2>Auxiliar de Loja</h2>
      <p>Leva menos de 2 minutos para se candidatar</p>
    </div>

    <div class="card">

      <label>Nome completo</label>
      <input type="text" id="nome" required />

      <label>Idade</label>
      <input type="number" id="idade" required />

      <label>Cidade onde mora</label>
      <input type="text" id="cidade" required />

      <label>Estado civil</label>
      <select id="estadoCivil">
        <option>Solteiro(a)</option>
        <option>Casado(a)</option>
        <option>Outro</option>
      </select>

      <label>Escolaridade</label>
      <select id="escolaridade">
        <option>Ensino fundamental</option>
        <option>Ensino médio incompleto</option>
        <option>Ensino médio completo</option>
        <option>Ensino superior</option>
      </select>

      <label>Último trabalho</label>
      <textarea id="ultimoTrabalho" rows="3"></textarea>

      <label>Pretensão salarial</label>
      <input type="text" id="pretensao" />

      <label>Disponibilidade para iniciar</label>
      <select id="disponibilidade">
        <option>Imediata</option>
        <option>15 dias</option>
        <option>30 dias</option>
      </select>

      <label>WhatsApp</label>
      <input type="text" id="whatsapp" required />

      <label>Você já trabalhou com atendimento ao cliente?</label>
      <select id="atendimento">
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>Tem experiência com vendas?</label>
      <select id="vendas">
        <option>Sim</option>
        <option>Não</option>
      </select>

      <button type="button" onclick="enviarWhatsApp()">
        🚀 Enviar candidatura
      </button>

    </div>

    <div class="footer">
      ⚡ Vagas limitadas • Entraremos em contato via WhatsApp
    </div>

  </div>

  <script>
    function enviarWhatsApp() {
      const nome = document.getElementById("nome").value;
      const idade = document.getElementById("idade").value;
      const cidade = document.getElementById("cidade").value;
      const estadoCivil = document.getElementById("estadoCivil").value;
      const escolaridade = document.getElementById("escolaridade").value;
      const ultimoTrabalho = document.getElementById("ultimoTrabalho").value;
      const pretensao = document.getElementById("pretensao").value;
      const disponibilidade = document.getElementById("disponibilidade").value;
      const whatsapp = document.getElementById("whatsapp").value;
      const atendimento = document.getElementById("atendimento").value;
      const vendas = document.getElementById("vendas").value;

   const mensagem = `*📋 NOVA CANDIDATURA - AUXILIAR DE LOJA*%0A
────────────────────%0A
👤 *Nome:* ${nome}%0A
🎂 *Idade:* ${idade}%0A
📍 *Cidade:* ${cidade}%0A
💍 *Estado civil:* ${estadoCivil}%0A
🎓 *Escolaridade:* ${escolaridade}%0A
%0A
💼 *Último trabalho:*%0A${ultimoTrabalho}%0A
%0A
💰 *Pretensão salarial:* ${pretensao}%0A
🚀 *Disponibilidade:* ${disponibilidade}%0A
📱 *WhatsApp:* ${whatsapp}%0A
%0A
🧑‍💼 *Atendimento ao cliente:* ${atendimento}%0A
💸 *Experiência com vendas:* ${vendas}%0A
────────────────────`;

      const numero = "5519991733777"; // 🔥 coloque seu número aqui

      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
    }
  </script>

</body>
</html>
